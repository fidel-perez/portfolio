
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex"><!-- per-target page; not for SEO -->
  <title>Smoke test</title>
  <meta name="description" content="smoke">
  
  <style>
    
    /* Theme tokens — palette + typography vars consumed by every block.
   Palettes are keyed; strategies pick one via theme.palette. New palette
   = new key here; no other file changes needed. */



:root {
  /* shared typography */
  --font-display: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-body: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: ui-monospace, "JetBrains Mono", Menlo, monospace;

  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 20px;

  --space-1: 0.5rem;
  --space-2: 1rem;
  --space-3: 1.5rem;
  --space-4: 2rem;
  --space-6: 3rem;
  --space-8: 5rem;

  --shadow-1: 0 1px 2px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.05);
  --shadow-2: 0 4px 8px rgba(0,0,0,0.08), 0 16px 32px rgba(0,0,0,0.10);


  /* felix-vino — bodega_acquisition palette */
  --bg: #f8f5ef;
  --bg-elev: #ffffff;
  --fg: #1a0f0c;
  --fg-muted: #5a4a44;
  --accent: #7c1c1c;
  --accent-hover: #5e1414;
  --accent-soft: #f0d8d8;
  --gold: #c9a84c;
  --rule: #e6dccc;

}

/* base resets shared by all blocks */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
body { font-family: var(--font-body); line-height: 1.6; -webkit-font-smoothing: antialiased; }
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); text-decoration: underline; }
h1, h2, h3 { font-family: var(--font-display); letter-spacing: -0.01em; line-height: 1.2; }
section { padding: var(--space-8) var(--space-3); }
section > .inner { max-width: 880px; margin: 0 auto; }
  </style>
</head>
<body>
  <main>
    
      <section class="block-hero_target">
  <style>
    .block-hero_target {
      background: linear-gradient(180deg, var(--bg-elev) 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--rule);
      padding-block: var(--space-8) var(--space-6);
    }
    .block-hero_target .inner { text-align: left; }
    .block-hero_target .eyebrow {
      display: inline-block;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 0.25rem 0.6rem;
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-2);
    }
    .block-hero_target h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      margin: 0 0 var(--space-1);
      color: var(--fg);
    }
    .block-hero_target .target-name { color: var(--accent); text-decoration: none; }
    .block-hero_target .target-name:hover { text-decoration: underline; }
    .block-hero_target .target-links {
      display: inline-flex; gap: var(--space-2);
      font-size: 0.95rem;
      color: var(--fg-muted);
      margin-left: var(--space-2);
    }
    .block-hero_target .target-links a {
      color: var(--fg-muted); text-decoration: none; border-bottom: 1px dotted var(--fg-muted);
    }
    .block-hero_target .target-links a:hover { color: var(--accent); border-bottom-color: var(--accent); }
    .block-hero_target .subtitle {
      font-size: 1.1rem;
      color: var(--fg-muted);
      margin: 0 0 var(--space-3);
    }
    .block-hero_target .tagline {
      font-size: 1.25rem;
      max-width: 36em;
      margin: 0;
      color: var(--fg);
      border-left: 3px solid var(--accent);
      padding-left: var(--space-2);
    }
  </style>
  <div class="inner">
    <span class="eyebrow">Test</span>
    <h1>
      <a class="target-name" href="https://example.com" target="_blank" rel="noopener">Smoke Test Bodega</a>
      
      <span class="target-links">
        <a href="https://example.com" target="_blank" rel="noopener">↗ site</a>
        <a href="https://example.com/contact" target="_blank" rel="noopener">✉ contact</a>
      </span>
      
    </h1>
    <p class="subtitle">Smoke</p>
    <p class="tagline">Smoke tagline.</p>
  </div>
</section>
    
      <section class="block-next_steps_cta">
  <style>
    .block-next_steps_cta {
      background: linear-gradient(180deg, var(--bg) 0%, var(--accent-soft) 100%);
      border-block: 1px solid var(--rule);
      text-align: center;
    }
    .block-next_steps_cta h2 {
      font-size: clamp(1.6rem, 3.4vw, 2.2rem);
      max-width: 22em;
      margin: 0 auto var(--space-2);
      color: var(--fg);
    }
    .block-next_steps_cta .body {
      max-width: 32em;
      margin: 0 auto var(--space-3);
      color: var(--fg-muted);
      font-size: 1.05rem;
    }
    .block-next_steps_cta .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: white;
      padding: 0.85rem 1.6rem;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 1.05rem;
      text-decoration: none;
      box-shadow: var(--shadow-2);
      transition: transform 120ms ease, background 120ms ease;
    }
    .block-next_steps_cta .cta:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      text-decoration: none;
      color: white;
    }
    .block-next_steps_cta .cta::after { content: " →"; }
    .block-next_steps_cta .secondary {
      display: block;
      margin-top: var(--space-2);
      font-size: 0.9rem;
      color: var(--fg-muted);
    }
    .block-next_steps_cta .secondary a { color: var(--accent); }
  </style>
  <div class="inner">
    <h2>15 min</h2>
    <p class="body">Body.</p>
    <a class="cta"
       href="mailto:hola@vendvino.es?subject=smoke">
      Click
    </a>
    
    <span class="secondary">
      o también — <a href="https://example.com" rel="noopener" target="_blank">link</a>
    </span>
    
  </div>
</section>
    
      <section class="block-footer_built_by_agents">
  <style>
    .block-footer_built_by_agents {
      background: var(--bg-elev);
      border-top: 1px solid var(--rule);
      padding-block: var(--space-4);
    }
    .block-footer_built_by_agents .inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-2);
      justify-content: space-between;
      font-size: 0.88rem;
      color: var(--fg-muted);
    }
    .block-footer_built_by_agents .glyph {
      font-family: var(--font-mono);
      color: var(--accent);
      font-weight: 600;
    }
    .block-footer_built_by_agents .meta {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--fg-muted);
      opacity: 0.7;
    }
    .block-footer_built_by_agents a { color: var(--accent); }
  </style>
  <div class="inner">
    <p>
      <span class="glyph">⌬ </span>
      
        Auto-generated by a private agent platform; published in the open-source portfolio at
        <a href="https://github.com/x/y" rel="noopener" target="_blank">github.com/fidel-perez/portfolio</a>.
      
    </p>
    
  </div>
</section>
    
  </main>
</body>
</html>
